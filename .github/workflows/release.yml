name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: kinglet-windows-x64
            ext: .exe
          - os: ubuntu-latest
            artifact: kinglet-linux-x64
            ext: ""
          - os: macos-latest
            artifact: kinglet-macos-arm64
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install GN
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/windows-amd64/+/latest"
            unzip gn.zip -d "$HOME/bin"
            echo "$HOME/bin" >> $GITHUB_PATH
          elif [ "$RUNNER_OS" == "macOS" ]; then
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/mac-arm64/+/latest"
            unzip gn.zip -d "$HOME/bin"
            echo "$HOME/bin" >> $GITHUB_PATH
          else
            curl -Lo gn.zip "https://chrome-infra-packages.appspot.com/dl/gn/gn/linux-amd64/+/latest"
            unzip gn.zip -d "$HOME/bin"
            echo "$HOME/bin" >> $GITHUB_PATH
          fi

      - name: Install Ninja
        uses: seanmiddleditch/gha-setup-ninja@v5

      - name: Generate build files
        shell: bash
        run: gn gen out/Release --args='is_debug=false'

      - name: Build
        shell: bash
        run: ninja -C out/Release

      - name: Package binaries
        shell: bash
        run: |
          mkdir -p dist
          cp out/Release/kinglet${{ matrix.ext }} dist/
          cp out/Release/kinglet-lsp${{ matrix.ext }} dist/
          cd dist && tar czf ../${{ matrix.artifact }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.tar.gz

  package-vsix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Update package.json version
        working-directory: editors/vscode
        run: npm version "$VERSION" --no-git-tag-version

      - name: Install dependencies
        working-directory: editors/vscode
        run: npm install

      - name: Package extension
        working-directory: editors/vscode
        run: npx @vscode/vsce package

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: kinglet-vsix
          path: editors/vscode/*.vsix

  release:
    needs: [build, package-vsix]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Resolve changelog
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CHANGELOG="docs/changelog/v${VERSION}.md"
          if [ -f "$CHANGELOG" ]; then
            echo "body_path=$CHANGELOG" >> $GITHUB_OUTPUT
          else
            echo "body_path=" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: ${{ steps.changelog.outputs.body_path || '' }}
          generate_release_notes: ${{ steps.changelog.outputs.body_path == '' }}
          files: |
            artifacts/kinglet-windows-x64/*.tar.gz
            artifacts/kinglet-linux-x64/*.tar.gz
            artifacts/kinglet-macos-arm64/*.tar.gz
            artifacts/kinglet-vsix/*.vsix
