  </defs>

  <rect x="20" y="20" width="140" height="140" rx="36" fill="url(#bg)"/>
  <rect x="36" y="36" width="108" height="108" rx="28" fill="none" stroke="#2D3A42" stroke-width="3"/>
  <g stroke-linecap="round" stroke-linejoin="round">
